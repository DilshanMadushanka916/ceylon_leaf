<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<section>
  <div class ="login-box">
  <form id="loginForm" action="/page/login.html" method="post">
    <h2>Login</h2>
    <div class ="input-box">
     <span class ="icon"><ion-icon name="mail"></ion-icon></span>
     <input type="email" name="email" required>
     <label >Email</label>
    </div>
    <div class ="input-box">
     <span class ="icon"><ion-icon name="lock-closed"></ion-icon></span>
     <input type="password" name="password" required>
     <label >Password</label>
    </div>
    <button type="submit">Login</button>
  </form>
  </section>
</body>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<script src="/ceylon_leaf/script.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.querySelector('[name="email"]').value;
    const password = document.querySelector('[name="password"]').value;

    fetch('http://localhost:3000/api/login', { 
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    })
    .then(res => {
        if (!res.ok) throw new Error("Invalid Credentials");
        return res.json();
    })
    .then(data => {
        // --- THE FIX IS HERE ---
        // 1. Save the typed email to localStorage immediately on successful login
        localStorage.setItem('userEmail', email); 
        
        alert("Login Success ✅");

        // 2. Redirect based on role using your exact file paths
        if (data.role === "collector") {
            window.location.href = "/page/collerctor.html";  
        } else if (data.role === "Accountant") {
            window.location.href = "/page/Accountant.html"; // Fixed path structure if needed
        }
    })
    .catch(err => {
        console.error(err);
        alert("Invalid email or password ❌");
    });
});
</script>

</html>
