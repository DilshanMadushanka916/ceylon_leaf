<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - Ceylon Leaf Tea</title>
    <link rel="stylesheet" href="/suppliers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/js/session-check.js"></script>
</head>
<body>
     <div class="sidebar">
        <div class="logo">
            <img src="/assets/Logo.png" alt="Logo">
            <h1 class="factory-title">
                CEYLON <span class="leaf-text">LEAF</span> 
                <small>TEA FACTORY</small>
            </h1>
        </div>

        <ul class="nav-links">
            <li>
                <a href="/page/Accountant/Accountant.html">
                    <i class="ph ph-house"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="active">
                <a href="/page/Accountant/supplier.html">
                    <i class="ph ph-users"></i>
                    <span>Suppliers</span>
                </a>
            </li>
            <li>
                <a href="reports.html">
                    <i class="ph ph-chart-line-up"></i>
                    <span>Reports</span>
                </a>
            </li>
            <li>
                <a href="/page/Accountant/Payment.html">
                    <i class="ph ph-wallet"></i>
                    <span>Payments</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- MAIN APP CONTENT AREA -->
    <div class="main-content">
        <!-- TOP NAVBAR WITH DROPDOWN -->
        <header class="top-navbar">
            <div class="nav-title">Supplier Dashboard</div>
            <div class="nav-profile" id="profileDropdownBtn">
                <span class="profile-name" id="userProfileName">Dilshan</span>
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80" alt="Profile" class="profile-img">
                <i class="ph ph-caret-down drop-arrow"></i>
                
                <div class="dropdown-menu" id="profileDropdownMenu">
                    <div class="dropdown-header">
                        <p class="user-role">Accountant Account</p>
                        <small id="userProfileEmail">Dilshan@gmail.com</small>
                    </div>
                    <hr>
                    <a href="/page/profile.html"><i class="ph ph-user"></i> My Profile</a>
                    <a href="/page/settings.html"><i class="ph ph-gear"></i> Settings</a>
                    <a href="/page/login.html" class="logout-btn" id="logoutBtn"><i class="ph ph-sign-out"></i> Log Out</a>
                </div>
            </div>
        </header>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search Supplier ID or Name">
        </div>

        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div>
                    <h3 style="margin: 0; color: #244635;">Supplier List</h3>
                    <small style="color: #999; font-size: 0.9rem;"><strong id="totalSuppliers">0</strong> suppliers loaded</small>
                </div>
            </div>
            <div class="table-scroll-wrapper">
                <table id="supplierTable">
                    <thead>
                        <tr>
                            <th>Supplier ID</th>
                            <th>Supplier Name</th>
                            <th>Field No</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="supplierTableBody">
                        <!-- populated dynamically -->
                    </tbody>
                </table>
            </div>
            <div style="text-align: center; padding: 10px; color: #999; font-size: 0.85rem;">
                ⬇ Scroll to see all <span id="totalSuppliers2">0</span> suppliers
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profileDropdownBtn = document.getElementById('profileDropdownBtn');
            const profileDropdownMenu = document.getElementById('profileDropdownMenu');
            const dropArrow = profileDropdownBtn.querySelector('.drop-arrow');

            profileDropdownBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                profileDropdownMenu.classList.toggle('show');
                if(profileDropdownMenu.classList.contains('show')) {
                    dropArrow.style.transform = 'rotate(180deg)';
                } else {
                    dropArrow.style.transform = 'rotate(0deg)';
                }
            });

            document.addEventListener('click', () => {
                if (profileDropdownMenu.classList.contains('show')) {
                    profileDropdownMenu.classList.remove('show');
                    dropArrow.style.transform = 'rotate(0deg)';
                }
            });

            const savedEmail = localStorage.getItem('userEmail');
            const displayName = localStorage.getItem('username') || (savedEmail ? savedEmail.split('@')[0] : 'User');
            if (savedEmail) {
                document.getElementById('userProfileEmail').textContent = displayName;
                document.getElementById('userProfileName').textContent = displayName;
            }

            const logoutBtn = document.getElementById('logoutBtn');
            if(logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('userEmail');
                    alert('Logging out...');
                    window.location.href = '/page/login.html';
                });
            }

            // Fetch suppliers and render table
            let allSuppliers = [];
            
            async function loadSuppliers() {
                try {
                    const res = await fetch('/api/suppliers-search?q=');
                    if (!res.ok) throw new Error('Failed to fetch suppliers');
                    allSuppliers = await res.json() || [];
                    console.log('✅ Loaded suppliers from API:', allSuppliers.length, 'total');
                    console.log('First 3 suppliers:', allSuppliers.slice(0, 3));
                    
                    renderSuppliers(allSuppliers);
                    document.getElementById('totalSuppliers').textContent = allSuppliers.length;
                    document.getElementById('totalSuppliers2').textContent = allSuppliers.length;
                } catch (err) {
                    console.error('❌ Error loading suppliers:', err);
                    document.getElementById('supplierTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;">Error loading suppliers. Check console.</td></tr>`;
                }
            }

            function renderSuppliers(suppliers) {
                const tbody = document.getElementById('supplierTableBody');
                if (!suppliers || suppliers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">No suppliers found.</td></tr>';
                    return;
                }
                
                console.log('📊 Rendering', suppliers.length, 'suppliers');
                
                tbody.innerHTML = suppliers.map(s => {
                    const statusText = s.account_status ? s.account_status : 'Active';
                    const statusClass = statusText.toLowerCase().includes('active') ? 'active-status' : 'inactive-status';
                    return `
                        <tr data-supplier-id="${s.sup_id}">
                            <td><strong>${s.sup_id}</strong></td>
                            <td>${s.supplier_name || '-'}</td>
                            <td>${s.supplier_field || '-'}</td>
                            <td class="${statusClass}">${statusText}</td>
                            <td><a href="supplier-detail.html?id=${s.sup_id}" class="view-btn-link"><button class="view-btn">View Profile</button></a></td>
                        </tr>
                    `;
                }).join('');
            }

            loadSuppliers();

            // Search functionality - filters from loaded data
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const q = e.target.value.trim().toLowerCase();
                
                if (!q) {
                    renderSuppliers(allSuppliers);
                    document.getElementById('totalSuppliers').textContent = allSuppliers.length;
                    document.getElementById('totalSuppliers2').textContent = allSuppliers.length;
                    return;
                }

                const filtered = allSuppliers.filter(s => {
                    const id = (s.sup_id || '').toLowerCase();
                    const name = (s.supplier_name || '').toLowerCase();
                    return id.includes(q) || name.includes(q);
                });

                console.log('🔍 Search for "' + q + '" found:', filtered.length, 'results');
                renderSuppliers(filtered);
                document.getElementById('totalSuppliers').textContent = filtered.length;
                document.getElementById('totalSuppliers2').textContent = filtered.length;
            });
        });
    </script>
</body>
</html>
