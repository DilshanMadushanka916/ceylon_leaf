<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - Ceylon Leaf Tea</title>
    <link rel="stylesheet" href="/suppliers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
     <!-- 🟢 NEW BRANDED SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="/assets/Logo.png" alt="Logo">
            <h1 class="factory-title">
                CEYLON <span class="leaf-text">LEAF</span> 
                <small>TEA FACTORY</small>
            </h1>
        </div>

        <!-- Navigation Links -->
        <ul class="nav-links">
            <li >
                <a href="/page/Accountant/Accountant.html">
                    <i class="ph ph-house"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="active">
                <a href="/page/Accountant/supplier.html">
                    <i class="ph ph-users"></i>
                    <span>Suppliers</span>
                </a>
            </li>
            <li>
                <a href="reports.html">
                    <i class="ph ph-chart-line-up"></i>
                    <span>Reports</span>
                </a>
            </li>
            <li>
                <a href="payments.html">
                    <i class="ph ph-wallet"></i>
                    <span>Payments</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- MAIN APP CONTENT AREA -->
    <div class="main-content">
        <!-- 🟢 NEW TOP NAVBAR WITH DROPDOWN -->
        <header class="top-navbar">
            <div class="nav-title">Accountant Dashboard</div>
            <div class="nav-profile" id="profileDropdownBtn">
                <span class="profile-name" id="userProfileName">Dilshan</span>
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80" alt="Profile" class="profile-img">
                <i class="ph ph-caret-down drop-arrow"></i>
                
                <!-- Dropdown Menu -->
                <div class="dropdown-menu" id="profileDropdownMenu">
                    <div class="dropdown-header">
                        <p class="user-role">Accountant Account</p>
                        <small id="userProfileEmail">Dilshan@gmail.com</small>
                    </div>
                    <hr>
                    <a href="/page/profile.html"><i class="ph ph-user"></i> My Profile</a>
                    <a href="/page/settings.html"><i class="ph ph-gear"></i> Settings</a>
                    <a href="/page/login.html" class="logout-btn" id="logoutBtn"><i class="ph ph-sign-out"></i> Log Out</a>
                </div>
            </div>
        </header>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search Supplier ID or Name">
        </div>

        <div class="table-card">
            <table id="supplierTable">
                <thead>
                    <tr>
                        <th>Supplier ID</th>
                        <th>Supplier Name</th>
                        <th>Field No</th>
                        <th>Status</th>
                        <th>View Profile</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>SL001</td><td>Anura Perera</td><td>F-12</td><td class="active-status">Active</td>
                        <td><button class="view-btn" onclick="openProfile('SL001')">View</button></td>
                    </tr>
                    <tr>
                        <td>SL002</td><td>Disna Silva</td><td>F-08</td><td class="active-status">Active</td>
                        <td><button class="view-btn" onclick="openProfile('SL002')">View</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
     <script src="https://unpkg.com/@phosphor-icons/web"></script>
     <script>
       document.addEventListener('DOMContentLoaded', () => {
    const profileDropdownBtn = document.getElementById('profileDropdownBtn');
    const profileDropdownMenu = document.getElementById('profileDropdownMenu');
    const dropArrow = profileDropdownBtn.querySelector('.drop-arrow');

    // 1. Dropdown එක Click කරාම open/close කරන්න
    profileDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // document click එක trigger වීම වැළැක්වීමට
        profileDropdownMenu.classList.toggle('show');
        
        // ඊතලය කරකවන්න (Animation)
        if(profileDropdownMenu.classList.contains('show')) {
            dropArrow.style.transform = 'rotate(180deg)';
        } else {
            dropArrow.style.transform = 'rotate(0deg)';
        }
    });

    // 2. Dropdown එකෙන් පිට ඕනෑම තැනක click කරොත් menu එක close කරන්න
    document.addEventListener('click', () => {
        if (profileDropdownMenu.classList.contains('show')) {
            profileDropdownMenu.classList.remove('show');
            dropArrow.style.transform = 'rotate(0deg)';
        }
    });

    // 3. LocalStorage එකෙන් Login වෙච්ච user ගේ email එක අරන් navbar එකට දාන්න
    const savedEmail = localStorage.getItem('userEmail');
    if (savedEmail) {
        document.getElementById('userProfileEmail').textContent = savedEmail;
        
        // Email එකෙන් නම විතරක් වෙන් කරලා ගන්න (උදා: Dilshan@gmail.com -> Dilshan)
        const namePart = savedEmail.split('@')[0];
        const capitalizedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        document.getElementById('userProfileName').textContent = capitalizedName;
    }

    // 4. Log Out button එක ක්‍රියා කරවීම
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('userEmail'); // session clear කරන්න
            alert('Logging out...');
            window.location.href = '/page/login.html'; // Redirect to the correct login page
        });
    }
    });

    </script>
    <script src="/js/suppliers.js"></script>
</body>
</html>
