<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Ceylon Leaf</title>
    <link rel="stylesheet" href="/profile.css">
</head>
<body>

    <div style="margin: 20px 0 0 20px;">
        <a href="#" onclick="history.back(); return false;" style="text-decoration: none; color: #27ae60; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;">
            <i class="ph ph-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header-main">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&auto=format&fit=crop&q=80" alt="User Profile" class="profile-avatar">
                <h2 id="profName">Loading...</h2>
                <span class="badge" id="profRole">Loading...</span>
            </div>
            
            <hr class="profile-hr">

            <div class="profile-details">
                <div class="detail-group">
                    <label><i class="ph ph-envelope"></i> Email Address</label>
                    <p id="profEmail">loading@gmail.com</p>
                </div>

                <div class="detail-group">
                    <label><i class="ph ph-phone"></i> Phone Number</label>
                    <p id="profPhone">Loading...</p>
                </div>

                <div class="detail-group">
                    <label><i class="ph ph-map-pin"></i> Home Address</label>
                    <p id="profAddress">Loading...</p>
                </div>
            </div>
            <button class="edit-profile-btn" onclick="alert('Edit functionality coming soon!')">Edit Profile</button>
        </div>
    </div>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const savedEmail = localStorage.getItem('userEmail') || localStorage.getItem('email');

        if (!savedEmail) {
            alert("Session expired or missing email reference. Redirecting to login...");
            window.location.href = "/login.html";
            return;
        }

        try {
            // FIX: Explicitly target your Node server on port 3000
            const targetUrl = `http://localhost:3000/api/user/profile?email=${encodeURIComponent(savedEmail.trim())}`;
            console.log("Sending fetch request to:", targetUrl);

            const response = await fetch(targetUrl); 
            
            if (!response.ok) {
                throw new Error(`Server returned error code status: ${response.status}`);
            }

            const userData = await response.json();
            console.log("Data packet parsed successfully:", userData);

            // Dynamically update your HTML profile card elements
            document.getElementById('profName').textContent = userData.username || "Unnamed User";
            document.getElementById('profRole').textContent = userData.role || "COLLECTOR";
            document.getElementById('profEmail').textContent = userData.email || savedEmail;
            document.getElementById('profPhone').textContent = userData.phone_number ;
            document.getElementById('profAddress').textContent = userData.address || "No address on file";

        } catch (error) {
            console.error('Network or database query failure caught:', error);
            
            // Fallback screen text mapping updates if connection drops or breaks
            document.getElementById('profName').textContent = "Error Loading Profile";
            document.getElementById('profRole').textContent = "ERROR";
            document.getElementById('profEmail').textContent = savedEmail; // This is why only email shows!
            document.getElementById('profPhone').textContent = "Profile Info Hidden";
            document.getElementById('profAddress').textContent = "Check browser F12 Console for error details.";
        }
    });
</script>
    
</body>
</html>
