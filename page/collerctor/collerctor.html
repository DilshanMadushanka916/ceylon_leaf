        const response = await fetch('http://localhost:3000/api/collect', {

            body: JSON.stringify(data)
        });

        if (!response.ok) throw new Error('Server responded with an error');

        const result = await response.json();
        if (result.success) {
    alert('✅ Data saved to database!');
    e.target.reset();
    
    // 🔥 FIX: Re-fill the date input immediately after resetting the form
    setCurrentDate();

    const supplierSearchInput = document.getElementById('supplier_search');
    const supplierIdInput = document.getElementById('supplier_id_input');
    const fieldNoInput = document.getElementById('field_no_input');

<script>
// Make this function accessible globally
function setCurrentDate() {
    const dateInput = document.getElementById('collection_date');
    if (dateInput) {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    // Set the initial date when page finishes loading
    setCurrentDate();

    const advanceCheckbox = document.getElementById('requestAdvance');
    const advanceAmountField = document.getElementById('advanceAmountField');

    // TOGGLE VISIBILITY
    if (advanceCheckbox && advanceAmountField) {
        advanceCheckbox.addEventListener('change', () => {
            if (advanceCheckbox.checked) {
                advanceAmountField.classList.remove('hidden-field');
            } else {
                advanceAmountField.classList.add('hidden-field');
                const input = advanceAmountField.querySelector('input');
                if (input) input.value = ""; // Clear value if unchecked
            }
        });
    }
});
</script>

  <script>
    // Supplier Search and Autocomplete Functionality
    const supplierSearchInput = document.getElementById('supplier_search');
    const supplierDropdown = document.getElementById('supplierDropdown');
    const supplierIdInput = document.getElementById('supplier_id_input');
    const fieldNoInput = document.getElementById('field_no_input');
    let suppliers = [];

    // Fetch suppliers when user types
    supplierSearchInput.addEventListener('input', async (e) => {
        const query = e.target.value.trim();
        
        if (query.length < 1) {
            supplierDropdown.classList.remove('show');
            return;
        }

        try {
            const response = await fetch(`http://localhost:3000/api/suppliers-search?q=${encodeURIComponent(query)}`);
            
            if (response.ok) {
                suppliers = await response.json();
                displaySupplierOptions(suppliers);
            }
        } catch (error) {
            console.error('Error fetching suppliers:', error);
        }
    });

    // Display supplier options in dropdown
    function displaySupplierOptions(supplierList) {
        supplierDropdown.innerHTML = '';
        
        if (supplierList.length === 0) {
            supplierDropdown.innerHTML = '<div class="supplier-option" style="color: #999; cursor: default;">No suppliers found</div>';
            supplierDropdown.classList.add('show');
            return;
        }

        supplierList.forEach(supplier => {
            const option = document.createElement('div');
            option.className = 'supplier-option';
            option.innerHTML = `
                <div class="supplier-option-id">${supplier.sup_id}</div>
                <div class="supplier-option-name">${supplier.supplier_name}</div>
                <div class="supplier-option-field">Field: ${supplier.supplier_field}</div>
            `;

            option.addEventListener('click', () => {
                selectSupplier(supplier);
            });

            supplierDropdown.appendChild(option);
        });

        supplierDropdown.classList.add('show');
    }

    // Select supplier and auto-fill field number
    function selectSupplier(supplier) {
        supplierSearchInput.value = `${supplier.sup_id} - ${supplier.supplier_name}`;
        supplierIdInput.value = supplier.sup_id;
        fieldNoInput.value = supplier.supplier_field;
        supplierDropdown.classList.remove('show');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.supplier-search-container')) {
            supplierDropdown.classList.remove('show');
        }
    });

    // Prevent form submission if supplier ID is not set
    const collectionForm = document.getElementById('collectionFormMain');
    collectionForm.addEventListener('submit', (e) => {
        if (!supplierIdInput.value) {
            e.preventDefault();
            alert('Please select a supplier from the dropdown');
            supplierSearchInput.focus();
        }
    });
  </script>
  <script>
document.addEventListener('DOMContentLoaded', () => {
    const profileDropdownBtn = document.getElementById('profileDropdownBtn');
    const profileDropdownMenu = document.getElementById('profileDropdownMenu');
    const dropArrow = profileDropdownBtn.querySelector('.drop-arrow');

    // 1. Dropdown එක Click කරාම open/close කරන්න
    profileDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // document click එක trigger වීම වැළැක්වීමට
        profileDropdownMenu.classList.toggle('show');
        
        // ඊතලය කරකවන්න (Animation)
        if(profileDropdownMenu.classList.contains('show')) {
            dropArrow.style.transform = 'rotate(180deg)';
        } else {
            dropArrow.style.transform = 'rotate(0deg)';
        }
    });

    // 2. Dropdown එකෙන් පිට ඕනෑම තැනක click කරොත් menu එක close කරන්න
    document.addEventListener('click', () => {
        if (profileDropdownMenu.classList.contains('show')) {
            profileDropdownMenu.classList.remove('show');
            dropArrow.style.transform = 'rotate(0deg)';
        }
    });

    // 3. LocalStorage එකෙන් Login වෙච්ච user ගේ email එක අරන් navbar එකට දාන්න
    const savedEmail = localStorage.getItem('userEmail');
    if (savedEmail) {
        document.getElementById('userProfileEmail').textContent = savedEmail;
        
        // Email එකෙන් නම විතරක් වෙන් කරලා ගන්න (උදා: Dilshan@gmail.com -> Dilshan)
        const namePart = savedEmail.split('@')[0];
        const capitalizedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        document.getElementById('userProfileName').textContent = capitalizedName;
    }

    // 4. Log Out button එක ක්‍රියා කරවීම
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('userEmail'); // session clear කරන්න
            alert('Logging out...');
            window.location.href = '/page/login.html'; // ඔයාගේ login page එකේ නම දෙන්න
        });
    }
});

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let priceChartInstance = null;

function initializePriceChart() {
    const canvasElement = document.getElementById('monthlyPriceChart');
    // Card eke price eka danna ona element eka methanadi select karagannawa
    const todayPriceElement = document.getElementById('todayPriceDisplay'); 
    
    if (!canvasElement) {
        console.error("❌ Canvas element 'monthlyPriceChart' not found.");
        return;
    }
    
    const ctx = canvasElement.getContext('2d');

    fetch(`http://localhost:3000/api/price-trend?t=${new Date().getTime()}`)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(result => {
            console.log("Frontend Received Payload Data:", result);

            if (result.success && result.labels && result.data && result.data.length > 0) {
                
                // ==========================================
                // 🔥 1. Anthima Data එක Card එකට දාන කොටස
                // ==========================================
                if (todayPriceElement) {
                    // Array eke anthima element eka gannawa: result.data[result.data.length - 1]
                    const latestPrice = result.data[result.data.length - 1];
                    todayPriceElement.innerText = `LKR ${latestPrice.toFixed(2)}`;
                }
                // ==========================================

                if (priceChartInstance) {
                    priceChartInstance.destroy();
                }

                priceChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: result.labels, 
                        datasets: [{
                            label: 'Tea Price (LKR)',
                            data: result.data,     
                            borderColor: '#2e7d32',
                            backgroundColor: 'rgba(46, 125, 50, 0.08)',
                            borderWidth: 3,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: false,
                                grace: '10%', 
                                ticks: { 
                                    callback: function(value) { 
                                        return 'Rs. ' + value; 
                                    } 
                                }
                            }
                        }
                    }
                });
            } else {
                console.warn("Chart data values array empty or misconfigured mapping properties.");
                if (todayPriceElement) todayPriceElement.innerText = "LKR --";
            }
        })
        .catch(error => {
            console.error("❌ Fetch / Rendering Exception Logic:", error);
            if (todayPriceElement) todayPriceElement.innerText = "Error";
        });
}

document.addEventListener("DOMContentLoaded", function() {
    initializePriceChart();
});
</script>
