<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylon Leaf - Tea Collector Dashboard</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/collcss.css"> 
</head>
<body>

    <nav class="modern-navbar">
        <div class="nav-left">
            <div class="logo-area">
                <img src="/assets/Logo1.png" alt="Logo">
                <h1 class="factory-title">
                    CEYLON <span class="leaf-text">LEAF</span> 
                    <small>TEA FACTORY</small>
                </h1>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="/page/collerctor/collerctor.html">
                        <i class="ph ph-house"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/page/collerctor/record.html">
                        <i class="ph ph-package"></i>
                        <span>Supply Records</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="nav-profile" id="profileDropdownBtn">
            <span class="profile-name" id="userProfileName">LOADING..</span>
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80" alt="Profile" class="profile-img">
            <i class="ph ph-caret-down drop-arrow"></i>
            
            <div class="dropdown-menu" id="profileDropdownMenu">
                <div class="dropdown-header">
                    <p class="user-role">Collector Account</p>
                    <small id="userProfileEmail">LOADING...</small>
                </div>
                <hr>
                <a href="/page/profile.html"><i class="ph ph-user"></i> My Profile</a>
                <a href="/page/settings.html"><i class="ph ph-gear"></i> Settings</a>
                <a href="/page/login.html" class="logout-btn" id="logoutBtn"><i class="ph ph-sign-out"></i> Log Out</a>
            </div>
        </div>
    </nav>

    <main class="content-area">
        <div class="main-wrapper">
            
            <div class="container">
                <h2>Tea Collection Entry</h2>
                <form id="collectionFormMain">
                    <label>Date</label>
                    <input type="date" id="collection_date" name="collection_date" required>

                    <label>Supplier Name or ID</label>
                    <div class="supplier-search-container">
                        <input type="text" id="supplier_search" placeholder="Enter Supplier Name or ID..." autocomplete="off" required>
                        <div class="supplier-dropdown" id="supplierDropdown"></div>
                    </div>

                    <input type="hidden" id="supplier_id_input" name="supplier_id">

                    <label>Field No (Auto-filled)</label> 
                    <input type="text" id="field_no_input" name="field_no" placeholder="Waiting for selection..." readonly style="background-color: #f7fafc; cursor: not-allowed; border-color: #e2e8f0;">

                    <label>Add the Weight (kg)</label>
                    <input type="number" name="kilos_collected" id="kilos_input" placeholder="Enter kilos">

                    <div class="advance-card">
                        <div class="advance-header">
                            <i class="ph ph-hand-coins"></i>
                            <span>Request Advance?</span>
                            <label class="switch">
                                <input type="checkbox" id="requestAdvance">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div id="advanceAmountField" class="hidden-field">
                            <label>Amount (LKR)</label>
                            <input type="number" name="advance_amount" placeholder="0.00">
                        </div>
                    </div>
                    <button type="submit">Save Data</button>
                </form>
            </div>

            <div class="dashboard-sidebar">
                <div class="price-gradient-card">
                    <span class="side-label">Today's Market Price</span>
                    <div class="side-value" id="todayPriceDisplay">LKR Loading..</div>
                    <div class="side-value"><span id="displayTotal"></span></div>
                </div>
                
                <div class="chart-card">
                    <h3>Monthly Price Trend (LKR)</h3>
                    <div style="width: 100%; height: 320px;">
                        <canvas id="monthlyPriceChart"></canvas>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loggedInEmail = localStorage.getItem('userEmail');

        if (!loggedInEmail) {
            alert('❌ Error: You are not logged in. Please log in first!');
            window.location.href = '/page/login.html';
            return;
        }

        const formData = new FormData(e.target);
        const data = {
            collection_date: formData.get('collection_date'),
            field_no: formData.get('field_no'),
            supplier_id: formData.get('supplier_id'),
            kilos_collected: formData.get('kilos_collected'),
            advance_requested: document.getElementById('requestAdvance').checked,
            advance_amount: formData.get('advance_amount') || 0,
            collector_email: loggedInEmail 
        };

        try {
            const response = await fetch('http://localhost:3000/api/collect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error('Server responded with an error');

            const result = await response.json();
            if (result.success) {
                alert('✅ Data saved to database!');
                e.target.reset();
                setCurrentDate(); 
                
                document.getElementById('supplier_search').value = '';
                document.getElementById('supplier_id_input').value = '';
                document.getElementById('field_no_input').value = '';
                document.getElementById('supplierDropdown').classList.remove('show');
                
                const advanceField = document.getElementById('advanceAmountField');
                if (advanceField) advanceField.classList.add('hidden-field');
            }
        } catch (error) {
            console.error('Fetch Error:', error);
            alert('❌ Could not connect to server. Make sure your Node.js terminal is running.');
        }
    });
    </script>

    <script>
    function setCurrentDate() {
        const dateInput = document.getElementById('collection_date');
        if (dateInput) {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        setCurrentDate();

        const advanceCheckbox = document.getElementById('requestAdvance');
        const advanceAmountField = document.getElementById('advanceAmountField');

        if (advanceCheckbox && advanceAmountField) {
            advanceCheckbox.addEventListener('change', () => {
                if (advanceCheckbox.checked) {
                    advanceAmountField.classList.remove('hidden-field');
                } else {
                    advanceAmountField.classList.add('hidden-field');
                    const input = advanceAmountField.querySelector('input');
                    if (input) input.value = "";
                }
            });
        }
    });
    </script>

    <script>
        const supplierSearchInput = document.getElementById('supplier_search');
        const supplierDropdown = document.getElementById('supplierDropdown');
        const supplierIdInput = document.getElementById('supplier_id_input');
        const fieldNoInput = document.getElementById('field_no_input');
        let suppliers = [];

        supplierSearchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 1) {
                supplierDropdown.classList.remove('show');
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/api/suppliers-search?q=${encodeURIComponent(query)}`);
                if (response.ok) {
                    suppliers = await response.json();
                    displaySupplierOptions(suppliers);
                }
            } catch (error) {
                console.error('Error fetching suppliers:', error);
            }
        });

        function displaySupplierOptions(supplierList) {
            supplierDropdown.innerHTML = '';
            if (supplierList.length === 0) {
                supplierDropdown.innerHTML = '<div class="supplier-option" style="color: #999; cursor: default;">No suppliers found</div>';
                supplierDropdown.classList.add('show');
                return;
            }

            supplierList.forEach(supplier => {
                const option = document.createElement('div');
                option.className = 'supplier-option';
                option.innerHTML = `
                    <div class="supplier-option-id">${supplier.sup_id}</div>
                    <div class="supplier-option-name">${supplier.supplier_name}</div>
                    <div class="supplier-option-field">Field: ${supplier.supplier_field}</div>
                `;

                option.addEventListener('click', () => {
                    selectSupplier(supplier);
                });
                supplierDropdown.appendChild(option);
            });
            supplierDropdown.classList.add('show');
        }

        function selectSupplier(supplier) {
            supplierSearchInput.value = `${supplier.sup_id} - ${supplier.supplier_name}`;
            supplierIdInput.value = supplier.sup_id;
            fieldNoInput.value = supplier.supplier_field;
            supplierDropdown.classList.remove('show');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.supplier-search-container')) {
                supplierDropdown.classList.remove('show');
            }
        });
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const profileDropdownBtn = document.getElementById('profileDropdownBtn');
        const profileDropdownMenu = document.getElementById('profileDropdownMenu');
        const dropArrow = profileDropdownBtn.querySelector('.drop-arrow');

        profileDropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdownMenu.classList.toggle('show');
            if(profileDropdownMenu.classList.contains('show')) {
                dropArrow.style.transform = 'rotate(180deg)';
            } else {
                dropArrow.style.transform = 'rotate(0deg)';
            }
        });

        document.addEventListener('click', () => {
            if (profileDropdownMenu.classList.contains('show')) {
                profileDropdownMenu.classList.remove('show');
                dropArrow.style.transform = 'rotate(0deg)';
            }
        });

        const savedEmail = localStorage.getItem('userEmail');
        if (savedEmail) {
            document.getElementById('userProfileEmail').textContent = savedEmail;
            const namePart = savedEmail.split('@')[0];
            const capitalizedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
            document.getElementById('userProfileName').textContent = capitalizedName;
        }

        const logoutBtn = document.getElementById('logoutBtn');
        if(logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('userEmail');
                alert('Logging out...');
                window.location.href = '/page/login.html';
            });
        }
    });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
    let priceChartInstance = null;

    function initializePriceChart() {
        const canvasElement = document.getElementById('monthlyPriceChart');
        const todayPriceElement = document.getElementById('todayPriceDisplay'); 
        
        if (!canvasElement) return;
        const ctx = canvasElement.getContext('2d');

        fetch(`http://localhost:3000/api/price-trend?t=${new Date().getTime()}`)
            .then(response => response.json())
            .then(result => {
                if (result.success && result.labels && result.data && result.data.length > 0) {
                    if (todayPriceElement) {
                        const latestPrice = result.data[result.data.length - 1];
                        todayPriceElement.innerText = `LKR ${latestPrice.toFixed(2)}`;
                    }

                    if (priceChartInstance) {
                        priceChartInstance.destroy();
                    }

                    priceChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: result.labels, 
                            datasets: [{
                                label: 'Tea Price (LKR)',
                                data: result.data,     
                                borderColor: '#2e7d32',
                                backgroundColor: 'rgba(46, 125, 50, 0.05)',
                                borderWidth: 3,
                                tension: 0.3,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    grace: '10%', 
                                    ticks: { callback: function(value) { return 'Rs. ' + value; } }
                                }
                            }
                        }
                    });
                } else {
                    if (todayPriceElement) todayPriceElement.innerText = "LKR --";
                }
            })
            .catch(error => {
                console.error("❌ Chart Error:", error);
                if (todayPriceElement) todayPriceElement.innerText = "Error";
            });
    }

    document.addEventListener("DOMContentLoaded", function() {
        initializePriceChart();
    });
    </script>
</body>
</html>
