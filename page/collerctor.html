<script>
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    // 1. Get the real logged-in email from localStorage right at submission time
    const loggedInEmail = localStorage.getItem('userEmail');

    // 2. Safety Check: If the user is not logged in, stop them!
    if (!loggedInEmail) {
        alert('❌ Error: You are not logged in. Please log in first!');
        window.location.href = 'login.html'; // Redirect to login page
        return;
    }

    const formData = new FormData(e.target);
    const data = {
        collection_date: formData.get('collection_date'),
        field_no: formData.get('field_no'),
        supplier_id: formData.get('supplier_id'),
        kilos_collected: formData.get('kilos_collected'),
        advance_requested: document.getElementById('requestAdvance').checked,
        advance_amount: formData.get('advance_amount') || 0,
        
        // 3. Changed from "Dilshan@gmail.com" to your real dynamic variable
        collector_email: loggedInEmail 
    };

    try {
        // Use the FULL URL of your server
        const response = await fetch('http://localhost:3000/api/collect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (!response.ok) throw new Error('Server responded with an error');

        const result = await response.json();
        if (result.success) {
            alert('✅ Data saved to database!');
            e.target.reset();
            
            // Optional: If you use the advance field toggle, reset its visibility here
            const advanceField = document.getElementById('advanceAmountField');
            if (advanceField) advanceField.classList.add('hidden-field');
        }
    } catch (error) {
        console.error('Fetch Error:', error);
        alert('❌ Could not connect to server. Make sure your Node.js terminal is running.');
    }
});

<script>
document.addEventListener('DOMContentLoaded', () => {
    const advanceCheckbox = document.getElementById('requestAdvance');
    const advanceAmountField = document.getElementById('advanceAmountField');
    const collectionForm = document.querySelector('form');

    // 1. TOGGLE VISIBILITY
    if (advanceCheckbox && advanceAmountField) {
        advanceCheckbox.addEventListener('change', () => {
            if (advanceCheckbox.checked) {
                advanceAmountField.classList.remove('hidden-field');
            } else {
                advanceAmountField.classList.add('hidden-field');
                const input = advanceAmountField.querySelector('input');
                if (input) input.value = ""; // Clear value if unchecked
            }
        });
    }

   // 2. HANDLE FORM SUBMISSION
if (collectionForm) {
    let isSubmitting = false; // Prevents double clicking

    collectionForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (isSubmitting) return; // Exit if already sending
        isSubmitting = true; 

        // Disable the submit button visually
        const submitBtn = collectionForm.querySelector('button[type="submit"]');
        if (submitBtn) submitBtn.disabled = true;

        // ... your existing data gathering logic ...

        try {
            const response = await fetch('http://localhost:3000/api/collect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.success) {
                alert('✅ Data saved successfully!');
                collectionForm.reset();
            }
        } catch (error) {
            console.error('Error:', error);

            
        } finally {
            // Re-enable after the process is done
            isSubmitting = false;
            if (submitBtn) submitBtn.disabled = false;
        }
    });
}
});
</script>

  <script>

    // Auto-fetch Field No when Supplier ID is entered
const supplierInput = document.getElementById('supplier_id_input');
const fieldInput = document.getElementById('field_no_input');

supplierInput.addEventListener('change', async () => {
    const supplierId = supplierInput.value;
    
    if (!supplierId) {
        fieldInput.value = "";
        return;
    }

    try {
        fieldInput.value = "Searching...";
        const response = await fetch(`http://localhost:3000/api/supplier-field/${supplierId}`);
        
        if (response.ok) {
            const data = await response.json();
            fieldInput.value = data.field_no; // Automatically sets the field number
        } else {
            fieldInput.value = "Not Found";
            console.warn("Supplier ID not found in database");
             alert("⚠️ No supplier found ");
        }
    } catch (error) {
        console.error("Error fetching field:", error);
        fieldInput.value = "Error";
    }
});

  </script>
  <script>
document.addEventListener('DOMContentLoaded', () => {
    const profileDropdownBtn = document.getElementById('profileDropdownBtn');
    const profileDropdownMenu = document.getElementById('profileDropdownMenu');
    const dropArrow = profileDropdownBtn.querySelector('.drop-arrow');

    // 1. Dropdown එක Click කරාම open/close කරන්න
    profileDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // document click එක trigger වීම වැළැක්වීමට
        profileDropdownMenu.classList.toggle('show');
        
        // ඊතලය කරකවන්න (Animation)
        if(profileDropdownMenu.classList.contains('show')) {
            dropArrow.style.transform = 'rotate(180deg)';
        } else {
            dropArrow.style.transform = 'rotate(0deg)';
        }
    });

    // 2. Dropdown එකෙන් පිට ඕනෑම තැනක click කරොත් menu එක close කරන්න
    document.addEventListener('click', () => {
        if (profileDropdownMenu.classList.contains('show')) {
            profileDropdownMenu.classList.remove('show');
            dropArrow.style.transform = 'rotate(0deg)';
        }
    });

    // 3. LocalStorage එකෙන් Login වෙච්ච user ගේ email එක අරන් navbar එකට දාන්න
    const savedEmail = localStorage.getItem('userEmail');
    if (savedEmail) {
        document.getElementById('userProfileEmail').textContent = savedEmail;
        
        // Email එකෙන් නම විතරක් වෙන් කරලා ගන්න (උදා: Dilshan@gmail.com -> Dilshan)
        const namePart = savedEmail.split('@')[0];
        const capitalizedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        document.getElementById('userProfileName').textContent = capitalizedName;
    }

    // 4. Log Out button එක ක්‍රියා කරවීම
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('userEmail'); // session clear කරන්න
            alert('Logging out...');
            window.location.href = 'login.html'; // ඔයාගේ login page එකේ නම දෙන්න
        });
    }
});


</script>
