<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/componet/hfstyle.css">
    <link rel="stylesheet" href="/collcss.css">
   
</head>

<body>
   <div id="header"></div>
    <main class="content-area">
     <div id="header"></div>
     
    <div class="container">
    <h2>Tea Collection Entry</h2>

    <form >
        
        <label>Date</label>
        <input type="date" name="collection_date" required>

        <label>Field No</label> 
        <input type="text" name="field_no" placeholder="Enter Field Number" required>

        <label>Supplier ID</label>
        <input type="number" name="supplier_id" placeholder="Enter Supplier ID" required>

        <label>Kilos Collected (kg)</label>
        <input type="number" step="0.01" name="kilos_collected" placeholder="Enter kilos" required>

        <button type="submit">Save Data</button>

    </form>
</div>
 <div>

        </main>

  <script src="/js/script.js"></script>
  <script src="/componet/hfscript.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        date: document.querySelector('[name="collection_date"]').value,
        field: document.querySelector('[name="field_no"]').value,
        supplier: document.querySelector('[name="supplier_id"]').value,
        kilos: document.querySelector('[name="kilos_collected"]').value
    };

    fetch('http://localhost:3000/api/collection/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
    });
});
</script>

  <footer id="footer"></footer>
</body>
</html>
